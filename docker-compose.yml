name: ${COMPOSE_PROJECT_NAME:-genghis-routing}

services:
  web-backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-genghis-routing}/web-backend:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME_PREFIX:-genghis-routing}-web-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "8000:8000"
    networks:
      - proxy_net
    profiles:
      - web-backend

  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-genghis-routing}/web:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME_PREFIX:-genghis-routing}-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - WEB_BACKEND_URL=${WEB_BACKEND_URL:-http://web-backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      - web-backend
    networks:
      - proxy_net
    profiles:
      - web
      - web-backend


networks:
  proxy_net:
    external: true
